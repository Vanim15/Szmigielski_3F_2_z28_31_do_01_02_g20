<h1>Teoria dotycząca pętli</h1>

<script>

document.write("<h2>Pętla for</h2>");
document.write("<b>Konstrukcja:</b><br>");
document.write("for(inicjalizacja; warunek; zmiana)<br>{ instrukcje }<br><br>");

document.write("<b>Opis:</b><br>");
document.write("Pętla for wykonuje się określoną liczbę razy. ");
document.write("Najczęściej używana gdy wiemy ile razy pętla ma się wykonać.<br><br>");

document.write("<b>Schemat blokowy:</b><br>");
document.write("start → inicjalizacja → warunek → instrukcje → zmiana → powrót do warunku<br><br>");


document.write("<h2>Pętla while</h2>");
document.write("<b>Konstrukcja:</b><br>");
document.write("while(warunek)<br>{ instrukcje }<br><br>");

document.write("<b>Opis:</b><br>");
document.write("Pętla z kontrolowanym wejściem. ");
document.write("Najpierw sprawdzany jest warunek, a dopiero potem wykonywane są instrukcje.<br><br>");

document.write("<b>Schemat blokowy:</b><br>");
document.write("start → sprawdzenie warunku → instrukcje → powrót do warunku<br><br>");


document.write("<h2>Pętla do...while</h2>");
document.write("<b>Konstrukcja:</b><br>");
document.write("do<br>{ instrukcje }<br>while(warunek);<br><br>");

document.write("<b>Opis:</b><br>");
document.write("Pętla z kontrolowanym wyjściem. ");
document.write("Najpierw wykonuje instrukcje, a dopiero potem sprawdza warunek. ");
document.write("Zawsze wykona się przynajmniej raz.<br><br>");

document.write("<b>Schemat blokowy:</b><br>");
document.write("start → instrukcje → sprawdzenie warunku → powrót do instrukcji<br>");

</script>
