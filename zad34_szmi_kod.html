<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zadanie 34</title>

<style>

li{
padding:10px;
border:3px solid gray;
width:250px;
}

.awatar{
width:80px;
height:80px;
border-radius:50%;
display:block;
margin-bottom:10px;
}

.email{
color:blue;
font-weight:bold;
}

</style>

</head>

<body>

<ul id="lista"></ul>

<script>
function User(email, awatar){
this.email=email;
this.awatar=awatar;
}

function UserView(user){
this.user=user;
this.dom=document.createElement("li");
this.img=document.createElement("img");
this.img.className="awatar";
this.link=document.createElement("a");
this.link.className="email";
this.dom.appendChild(this.img);
this.dom.appendChild(this.link);
this.refresh();
}
UserView.prototype.refresh=function(){
this.img.src=this.user.awatar;

this.link.href="mailto:"+this.user.email;
this.link.textContent=this.user.email;

};

let user1=new User(
"jan.kowalski@gmail.com",
"awatar.png"
);
let view1=new UserView(user1);
document.getElementById("lista").appendChild(view1.dom);
</script>

</body>
</html>
